<head>
  <meta charset='utf-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <meta content='#2f3241' name='theme-color' />
  <link rel='shortcut icon' href='{{ site.baseurl }}/images/favicon.ico'/>
  <link rel='stylesheet' href='{{ site.baseurl }}/css/index.css'>
  <link rel="stylesheet" href="{{site.baseurl}}/lib/fontawesome-free-5.2.0/css/all.min.css">
  <link rel="stylesheet" href="{{site.baseurl}}/lib/slick-1.8.1/slick/slick.css" />
  <link rel="stylesheet" href="{{site.baseurl}}/lib/slick-1.8.1/slick/slick-theme.css" />

  <!-- Loading page specific css file -->
  {% if page.custom_css %}
    {% for css_file in page.custom_css %}
      <script type="stylesheet" src="{{css_file}}"></script>
    {% endfor %}
  {% endif %}

  {% seo %}
  {% feed_meta %}

</head>
