  name: 'Derek Chin'
  title: 'Co-founder'
  bio: 'Derek is a blockchain enthusiast. Previously a developer at <a href="https://blockchain.berkeley.edu/">Blockchain at Berkeley</a>, he constructed a solution for storing and verifying digital assets. Derek was an intern in <a href="https://usa.visa.com/"> Visa </a>, a leader in the financial services industry, for both the summer of 2017 and 2018 in the Singapore and Bay Area offices. Now working on a <a href="http://hackingdistributed.com/2017/08/28/submarine-sends/"> submarine send </a> implementation on Ethereum in collaboration with <a href="http://www.initc3.org/"> IC3 </a>'
