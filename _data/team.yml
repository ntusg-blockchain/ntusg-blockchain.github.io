  bio: 'Dr. Wen is an associate professor of School of Computer Science and Engineering at NTU, while serving as the acting director of <a href="http://www.ntc.ntu.edu.sg/Pages/home.aspx">Nanyang Technopreneurship Centre</a>. Received his PhD in EECS from Massachusetts Institute of Technology (MIT), Dr. Wen is the master mind of most early blockchain initiatives, academic courses and research projects at NTU.'
