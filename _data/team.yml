  bio: 'Zhiyao worked on <a href="http://www.mas.gov.sg/Singapore-Financial-Centre/Smart-Financial-Centre/Project-Ubin.aspx">Project Ubin</a> at J.P. Morgan <a href="https://www.jpmorgan.com/global/Quorum">Quorum team</a> in 2017. He designed and built a curation-market based, decentralized peer review platform for his undergraduate thesis project. Now working as a full-time developer at J.P. Morgan.'
