mission: 'Blockchain at NTU is dedicated to fostering a vibrant blockchain community in NTU and beyond. We are committed to building and strengthening the technical expertise and market awareness of our members while empowering like-minded individuals in pursuit of their interests in academic, enterprise or entrepreneurial endeavor.'

who_we_are: "Founded in July 2017, We're a <strong>non-profit student club</strong> consists of Blockchain enthusiasts with background ranging from computer science, to math, to business here at Nanyang Technological University in Singapore."

principles: 'We strongly believe in a <a>scientific, fact-based and open-source</a> approach to investigate, employ and further advance blockchain technologies; We disregard irrational hype, blind maximalists and speculative behaviors. In essence, we put, and proudly so, <a>disproportionate emphasis on solid, technicial understanding</a> of the technology and its implications, which is fundamental to any discussion of blockchain.'

education_intro: 'We carefully designed and teach "Blockchain Fundamentals" courses on campus, ranging from cryptography to smart contract security. We reckon that systematic, consistent materials with incremental depth are lacking, thus we put efforts into organizing them and make them publically available.'

research_dev_intro: 'We investigate protocols and designs steming from academia and industries, meanwhile we propose our analysis results, improvisations and our own noval ideas. On top of theoretical work, we implement open-sourced libraries and build applications using state-of-the-art framework and development tools.'

consulting_intro: 'We formulate "solution teams" to tackle specific problems in the community or of a client. Business development and market insights will shine on their merits for adding values to creative business models or solving an existing painpoint.'

